<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karen 學生進度紀錄系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B2A4A;--yellow:#F5C518;--text:#1a1a2e;--text-sub:#5a6278;--text-hint:#9299ad;--bg:#f7f8fc;--card:#fff;--border:#e4e7f0;--green:#27500A;--green-bg:#EAF3DE;--green-border:#C0DD97;--red:#791F1F;--red-bg:#FCEBEB;--blue:#0C447C;--blue-bg:#E6F1FB;--amber:#633806;--amber-bg:#FAEEDA;--amber-border:#FAC775}
body{font-family:-apple-system,"Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--navy);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow)}
.brand-name{color:#fff;font-size:14px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.wh-status{display:flex;align-items:center;gap:6px;font-size:11px}
.wh-dot{width:6px;height:6px;border-radius:50%;background:#5a6278}
.wh-dot.ok{background:#70c040}
.wh-label{color:#9299ad}
.btn-config{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.container{max-width:760px;margin:0 auto;padding:1.5rem}
.config-bar{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:8px;padding:12px;margin-bottom:1rem;display:none}
.config-title{font-size:12px;font-weight:500;color:var(--amber);margin-bottom:6px}
.config-row{display:flex;gap:6px}
.config-row input{flex:1;padding:6px 10px;border:1px solid var(--amber-border);border-radius:5px;font-size:11px;font-family:monospace;background:#fff}
.btn-sm{padding:6px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:500;border:none}
.btn-save{background:var(--navy);color:#fff}
.btn-test{background:#fff;color:var(--navy);border:1px solid var(--navy)}
.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:1.25rem}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;cursor:pointer;border-radius:6px;color:var(--text-sub);border:none;background:none;font-family:inherit}
.tab.active{background:var(--navy);color:#fff;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.75rem}
.card-title{font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.form-grid{display:grid;gap:10px;margin-bottom:10px}
.col1{grid-template-columns:1fr}.col2{grid-template-columns:1fr 1fr}.col3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--text-sub);font-weight:500}
.req{color:#e24b4a;margin-left:2px}
.field input,.field select,.field textarea{padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;color:var(--text)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 2px rgba(27,42,74,.08)}
.field textarea{resize:vertical;line-height:1.5}
.btn-primary{background:var(--navy);color:#fff;padding:9px 18px;border-radius:7px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:#fff;color:var(--text);padding:7px 14px;border-radius:7px;border:1px solid var(--border);font-size:12px;cursor:pointer;font-family:inherit}
.action-row{display:flex;gap:8px;align-items:center;margin-top:.75rem;flex-wrap:wrap}
.notice{border-radius:7px;padding:9px 12px;font-size:12px;margin-top:.75rem;line-height:1.5}
.notice.info{background:var(--blue-bg);color:var(--blue)}
.notice.success{background:var(--green-bg);color:var(--green)}
.notice.warn{background:var(--amber-bg);color:var(--amber)}
.student-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.student-row:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.meta{flex:1}.meta-name{font-size:13px;font-weight:500}
.meta-sub{font-size:11px;color:var(--text-sub);margin-top:1px}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:500}
.pb-wrap{width:70px}.pb{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pb-fill{height:100%;background:#639922;border-radius:2px}
.pb-lbl{font-size:9px;color:var(--text-hint);text-align:right}
.hw-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.hw-item:last-child{border-bottom:none}
.hw-name{font-weight:500}.hw-detail{font-size:11px;color:var(--text-sub);margin-top:2px}
.score{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;white-space:nowrap}
.week-grid{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;margin-bottom:8px}
.week-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer}
.week-dot.done{background:var(--green-bg);border-color:#639922;color:var(--green)}
.week-dot.current{background:var(--blue-bg);border-color:#185FA5;color:var(--blue)}
.week-lbl{font-size:9px;color:var(--text-hint);text-align:center;margin-bottom:3px}
.loading{text-align:center;padding:2rem;color:var(--text-hint);font-size:13px}
.empty{text-align:center;padding:1.5rem;color:var(--text-hint);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;display:none;z-index:999;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.success{background:var(--green-bg);color:var(--green)}.toast.error{background:var(--red-bg);color:var(--red)}
.toast.loading{background:var(--card);color:var(--text);border:1px solid var(--border)}
#test-result{display:none;margin-top:6px;font-size:11px}
@media(max-width:600px){.col3{grid-template-columns:1fr 1fr}.col2{grid-template-columns:1fr}.container{padding:1rem}.week-dot{width:20px;height:20px;font-size:8px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="brand-dot"></div><span class="brand-name">karen_contentbestie 教學管理</span></div>
  <div class="topbar-right">
    <div class="wh-status"><div class="wh-dot" id="wh-dot"></div><span class="wh-label" id="wh-label">載入中</span></div>
    <button class="btn-config" onclick="toggleConfig()">⚙ 設定</button>
  </div>
</div>

<div class="container">
  <div class="config-bar" id="config-bar">
    <div class="config-title">n8n Webhook URL（寫入用）</div>
    <div class="config-row">
      <input type="text" id="wh-write" placeholder="https://xxx.app.n8n.cloud/webhook/student-progress">
      <button class="btn-sm btn-save" onclick="saveConfig()">儲存</button>
      <button class="btn-sm btn-test" onclick="testConfig()">測試</button>
    </div>
    <div class="config-title" style="margin-top:8px">n8n 讀取 URL</div>
    <div class="config-row">
      <input type="text" id="wh-read" placeholder="https://xxx.app.n8n.cloud/webhook/student-data">
    </div>
    <div id="test-result"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">學生總覽</button>
    <button class="tab" onclick="switchTab('session')">新增紀錄</button>
    <button class="tab" onclick="switchTab('weekly')">週次進度</button>
    <button class="tab" onclick="switchTab('hw')">作業追蹤</button>
  </div>

  <!-- 學生總覽 -->
  <div class="section active" id="tab-overview">
    <div class="card">
      <div class="card-title">目前學生</div>
      <div id="student-list"><div class="loading">載入中…</div></div>
    </div>
  </div>

  <!-- 新增紀錄 -->
  <div class="section" id="tab-session">
    <div class="card">
      <div class="card-title">基本資訊</div>
      <div class="form-grid col3">
        <div class="field"><label>學生姓名<span class="req">*</span></label><input type="text" id="s-name"></div>
        <div class="field"><label>課程<span class="req">*</span></label>
          <select id="s-course"><option value="WA-01-01">WA-01-01 — n8n 自動化</option><option value="MKT-01-01">MKT-01-01 — 內容創作發想</option><option value="MKT-03-01">MKT-03-01 — 社群經營概論</option><option value="KOL-01-01">KOL-01-01 — 短影音企劃</option><option value="KOL-02-01">KOL-02-01 — 剪輯拍攝企劃</option></select>
        </div>
        <div class="field"><label>週次<span class="req">*</span></label>
          <select id="s-week"><option>W0</option><option>W1</option><option>W2</option><option selected>W3</option><option>W4</option><option>W5</option><option>W6</option><option>W7</option><option>W8</option><option>W9</option><option>W10</option></select>
        </div>
      </div>
      <div class="form-grid col2">
        <div class="field"><label>諮詢日期</label><input type="date" id="s-date"></div>
        <div class="field"><label>時長（分鐘）</label><input type="number" id="s-dur" value="60"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">本次重點</div>
      <div class="form-grid col1">
        <div class="field"><label>討論主題<span class="req">*</span></label><textarea id="s-topic" rows="2"></textarea></div>
        <div class="field"><label>學生強項（≥3點，換行分隔）<span class="req">*</span></label><textarea id="s-strength" rows="3" placeholder="1. &#10;2. &#10;3. "></textarea></div>
        <div class="field"><label>待改進方向（≥3點）<span class="req">*</span></label><textarea id="s-weak" rows="3" placeholder="1. &#10;2. &#10;3. "></textarea></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">後續追蹤</div>
      <div class="form-grid col1"><div class="field"><label>指派作業<span class="req">*</span></label><input type="text" id="s-hw"></div></div>
      <div class="form-grid col3">
        <div class="field"><label>作業繳交日</label><input type="date" id="s-hwdate"></div>
        <div class="field"><label>下次諮詢日</label><input type="date" id="s-next"></div>
        <div class="field"><label>里程碑</label>
          <select id="s-milestone"><option>進行中</option><option>提案核准</option><option>開案費已付</option><option>最終交付</option><option>結案</option></select>
        </div>
      </div>
      <div class="form-grid col1"><div class="field"><label>備註</label><textarea id="s-note" rows="2"></textarea></div></div>
    </div>
    <div class="action-row">
      <button class="btn-primary" id="submit-btn" onclick="submitSession()">↗ 儲存並送出</button>
      <span id="submit-hint" style="font-size:11px;color:var(--text-hint)"></span>
    </div>
    <div id="save-notice" style="display:none"></div>
  </div>

  <!-- 週次進度 -->
  <div class="section" id="tab-weekly">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-size:14px;font-weight:500" id="wk-name">—</div><span class="badge" id="wk-badge" style="background:#EEEDFE;color:#3C3489;margin-top:3px">—</span></div>
        <select id="student-sel" onchange="changeWeeklyStudent()" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit"></select>
      </div>
      <div class="card-title">W0 → W10</div>
      <div class="week-grid" id="week-grid"></div>
    </div>
    <div class="card">
      <div class="card-title" id="wk-detail-title">— 本週紀錄</div>
      <div class="form-grid col3">
        <div class="field"><label>諮詢狀態</label><select id="wk-ss"><option>已完成</option><option>缺席</option><option>已改期</option><option>未安排</option></select></div>
        <div class="field"><label>作業狀態</label><select id="wk-hs"><option>已繳交</option><option>待批改</option><option>遲交</option><option>未繳</option></select></div>
        <div class="field"><label>評分</label><select id="wk-hsc"><option>A（優秀）</option><option>B（良好）</option><option>C（待加強）</option><option>D（需重做）</option><option>未批改</option></select></div>
      </div>
      <div class="form-grid col1"><div class="field"><label>備註</label><textarea id="wk-note" rows="2"></textarea></div></div>
      <div class="action-row"><button class="btn-primary" onclick="submitWeekly()">↗ 儲存週次紀錄</button></div>
    </div>
  </div>

  <!-- 作業追蹤 -->
  <div class="section" id="tab-hw">
    <div class="card">
      <div class="card-title">批改待辦</div>
      <div id="hw-list"><div class="loading">載入中…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WRITE_DEFAULT = 'https://kcsilent712.app.n8n.cloud/webhook/student-progress';
const READ_DEFAULT  = 'https://kcsilent712.app.n8n.cloud/webhook/student-data';
const COURSES = {'WA-01-01':'n8n 全方位自動化','MKT-01-01':'內容創作發想','MKT-03-01':'社群經營概論','KOL-01-01':'短影音系列企劃','KOL-02-01':'剪輯拍攝企劃'};
const COURSE_COLORS = {'WA-01-01':['#EEEDFE','#3C3489'],'MKT-01-01':['#E1F5EE','#085041'],'MKT-03-01':['#FAEEDA','#633806'],'KOL-01-01':['#FBEAF0','#72243E'],'KOL-02-01':['#E6F1FB','#0C447C']};
const WEEKS = ['W0','W1','W2','W3','W4','W5','W6','W7','W8','W9','W10'];

let DATA = { students:[], homework:[], sessions:[] };
let currentWeekSel = 'W3';

function getWriteUrl(){ return localStorage.getItem('wh_write') || WRITE_DEFAULT; }
function getReadUrl(){ return localStorage.getItem('wh_read') || READ_DEFAULT; }

function toggleConfig(){
  const b=document.getElementById('config-bar');
  b.style.display=b.style.display==='block'?'none':'block';
  document.getElementById('wh-write').value=getWriteUrl();
  document.getElementById('wh-read').value=getReadUrl();
}
function saveConfig(){
  const w=document.getElementById('wh-write').value.trim();
  const r=document.getElementById('wh-read').value.trim();
  if(w) localStorage.setItem('wh_write',w);
  if(r) localStorage.setItem('wh_read',r);
  updateDot(true);
  document.getElementById('config-bar').style.display='none';
  showToast('已儲存 ✓','success');
}
async function testConfig(){
  const res=document.getElementById('test-result');
  res.style.display='block';res.textContent='測試中…';res.style.color='var(--text-sub)';
  try{
    const r=await fetch(getWriteUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({test:true,studentName:'測試',courseId:'WA-01-01',weekNum:'W0',sessionDate:'2026-01-01'})});
    if(r.ok){res.style.color='var(--green)';res.textContent='✓ 寫入連線正常';showToast('連線成功 ✓','success');}
    else{res.style.color='var(--red)';res.textContent='✗ HTTP '+r.status;}
  }catch(e){res.style.color='var(--red)';res.textContent='✗ 連線失敗';}
}
function updateDot(ok){
  document.getElementById('wh-dot').className='wh-dot'+(ok?' ok':'');
  document.getElementById('wh-label').textContent=ok?'已連線':'未連線';
}
function showToast(m,t='success'){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
function switchTab(t){document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');const ts=['overview','session','weekly','hw'];document.querySelectorAll('.tab')[ts.indexOf(t)].classList.add('active');}

// ── 載入資料 ────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch(getReadUrl());
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA=await r.json();
    updateDot(true);
    renderOverview();
    renderHomework();
    renderWeeklySelector();
    renderWeekGrid();
  }catch(e){
    console.warn('讀取失敗:',e);
    document.getElementById('student-list').innerHTML='<div class="empty">尚無資料或無法連線讀取端點</div>';
    document.getElementById('hw-list').innerHTML='<div class="empty">尚無資料</div>';
    updateDot(false);
  }
}

// ── 學生總覽 ────────────────────────────────────────────────
function renderOverview(){
  const el=document.getElementById('student-list');
  const students=DATA.students||[];
  if(!students.length){el.innerHTML='<div class="empty">尚無學生資料</div>';return;}
  el.innerHTML=students.map(s=>{
    const cc=COURSE_COLORS[s.course_id]||['#f0f0f0','#333'];
    const wNum=parseInt((s.week_num||'W0').replace('W',''))||0;
    const pct=Math.round(wNum/10*100);
    return `<div class="student-row">
      <div class="avatar" style="background:${cc[0]};color:${cc[1]}">${(s.student_name||'?')[0]}</div>
      <div class="meta">
        <div class="meta-name">${s.student_name||'—'}</div>
        <div class="meta-sub"><span class="badge" style="background:${cc[0]};color:${cc[1]}">${s.course_id||''}</span> ${s.week_num||''}</div>
      </div>
      <div class="pb-wrap"><div class="pb"><div class="pb-fill" style="width:${pct}%"></div></div><div class="pb-lbl">${s.week_num||'W0'}/W10</div></div>
      <span class="badge" style="background:${s.milestone_status==='提案核准'?'var(--green-bg)':'var(--blue-bg)'};color:${s.milestone_status==='提案核准'?'var(--green)':'var(--blue)'}">${s.milestone_status||'進行中'}</span>
      <button class="btn-outline" style="padding:4px 10px;font-size:11px" onclick="quickFill('${s.student_name}','${s.course_id}','${s.week_num||'W0'}')">填紀錄</button>
    </div>`;
  }).join('');
}

// ── 作業追蹤 ────────────────────────────────────────────────
function renderHomework(){
  const el=document.getElementById('hw-list');
  const hw=(DATA.homework||[]).filter(h=>h.student_name);
  if(!hw.length){el.innerHTML='<div class="empty">尚無作業紀錄</div>';return;}
  el.innerHTML=hw.slice(-20).reverse().map(h=>{
    const isDone=h.hw_status==='已批改';
    const scoreBg=h.hw_score&&h.hw_score.includes('A')?'var(--green-bg)':h.hw_score&&h.hw_score.includes('B')?'var(--blue-bg)':'var(--amber-bg)';
    const scoreColor=h.hw_score&&h.hw_score.includes('A')?'var(--green)':h.hw_score&&h.hw_score.includes('B')?'var(--blue)':'var(--amber)';
    return `<div class="hw-item">
      <div class="hw-name" ${isDone?'style="text-decoration:line-through;color:var(--text-hint)"':''}>${h.student_name} — ${h.week_num}</div>
      <div style="flex:1"><div class="hw-detail">${h.homework_assigned||'—'} · ${h.hw_submit_date?'繳交 '+h.hw_submit_date:''} ${h.hw_review_deadline?'· 截止 '+h.hw_review_deadline:''}</div></div>
      <span class="score" style="background:${scoreBg};color:${scoreColor}">${h.hw_status||'待批改'}</span>
    </div>`;
  }).join('');
}

// ── 週次進度 ────────────────────────────────────────────────
function renderWeeklySelector(){
  const sel=document.getElementById('student-sel');
  const students=DATA.students||[];
  sel.innerHTML=students.map(s=>`<option value="${s.student_name}|${s.course_id}">${s.student_name} (${s.course_id})</option>`).join('');
  if(students.length) changeWeeklyStudent();
}
function changeWeeklyStudent(){
  const val=document.getElementById('student-sel').value;
  if(!val) return;
  const [name,course]=val.split('|');
  document.getElementById('wk-name').textContent=name;
  const cc=COURSE_COLORS[course]||['#f0f0f0','#333'];
  const badge=document.getElementById('wk-badge');
  badge.textContent=course;badge.style.background=cc[0];badge.style.color=cc[1];
  renderWeekGrid(name,course);
}
function renderWeekGrid(name,course){
  const sessions=(DATA.sessions||[]).filter(s=>s.student_name===name&&s.course_id===course);
  const doneWeeks=new Set(sessions.map(s=>s.week_num));
  const student=(DATA.students||[]).find(s=>s.student_name===name&&s.course_id===course);
  const currentWeek=student?student.week_num:'W0';
  document.getElementById('week-grid').innerHTML=WEEKS.map(w=>{
    let cls='';let icon='';
    if(doneWeeks.has(w)){cls='done';icon='✓';}
    else if(w===currentWeek){cls='current';icon='●';}
    return `<div><div class="week-lbl">${w}</div><div class="week-dot ${cls}" onclick="selectWeek('${w}')">${icon}</div></div>`;
  }).join('');
}
function selectWeek(w){currentWeekSel=w;document.getElementById('wk-detail-title').textContent=w+' — 本週紀錄';}

// ── 表單提交 ────────────────────────────────────────────────
function quickFill(n,c,w){switchTab('session');document.getElementById('s-name').value=n;document.getElementById('s-course').value=c;const sel=document.getElementById('s-week');Array.from(sel.options).forEach(o=>{if(o.value===w)o.selected=true;});}
function validate(){
  const n=document.getElementById('s-name').value.trim();
  const t=document.getElementById('s-topic').value.trim();
  const st=document.getElementById('s-strength').value.trim();
  const wk=document.getElementById('s-weak').value.trim();
  const hw=document.getElementById('s-hw').value.trim();
  if(!n){showToast('請填學生姓名','error');return null;}
  if(!t){showToast('請填討論主題','error');return null;}
  if(!hw){showToast('請填指派作業','error');return null;}
  if(st.split('\n').filter(l=>l.trim()).length<3){showToast('強項至少3點','error');return null;}
  if(wk.split('\n').filter(l=>l.trim()).length<3){showToast('待改進至少3點','error');return null;}
  return{studentName:n,courseId:document.getElementById('s-course').value,courseName:COURSES[document.getElementById('s-course').value]||'',weekNum:document.getElementById('s-week').value,sessionDate:document.getElementById('s-date').value,sessionDuration:document.getElementById('s-dur').value,topic:t,strengths:st,improvements:wk,homework:hw,hwSubmitDate:document.getElementById('s-hwdate').value,nextSession:document.getElementById('s-next').value,milestone:document.getElementById('s-milestone').value,notes:document.getElementById('s-note').value.trim(),hwStatus:'待批改',hwScore:''};
}
async function submitSession(){
  const p=validate();if(!p)return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送出中…';
  try{
    const r=await fetch(getWriteUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    if(r.ok){
      showToast('✓ 已寫入 Google Sheets','success');
      const n=document.getElementById('save-notice');n.className='notice success';n.textContent='✓ 紀錄已成功寫入！';n.style.display='block';
      setTimeout(()=>n.style.display='none',5000);
      setTimeout(loadData,1500);
    }else{showToast('寫入失敗 HTTP '+r.status,'error');}
  }catch(e){showToast('連線失敗','error');}
  btn.disabled=false;btn.textContent='↗ 儲存並送出';
}
async function submitWeekly(){
  const val=document.getElementById('student-sel').value;
  if(!val){showToast('請選擇學生','error');return;}
  const[name,course]=val.split('|');
  const p={studentName:name,courseId:course,weekNum:currentWeekSel,hwStatus:document.getElementById('wk-hs').value,hwScore:document.getElementById('wk-hsc').value,notes:document.getElementById('wk-note').value,milestone:document.getElementById('wk-ss').value==='已完成'?'進行中':'進行中'};
  try{
    const r=await fetch(getWriteUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    if(r.ok){showToast('週次紀錄已送出 ✓','success');setTimeout(loadData,1500);}
    else showToast('失敗','error');
  }catch(e){showToast('連線失敗','error');}
}

// ── 初始化 ────────────────────────────────────────────────
document.getElementById('s-date').valueAsDate=new Date();
updateDot(!!getWriteUrl());
loadData();
</script>
